<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Junction E2E Test</title>
  <script src="/dist/entry.global.js"></script>
</head>
<body>
  <h1>Junction E2E Test Fixture</h1>
  <script>
    // ─── Test infrastructure ──────────────────────────────────────
    window.__TEST__ = { events: [], collector: null };

    /**
     * Sink factory — creates a mock destination that logs sends to window.__TEST__.events
     */
    function createSink(name, consent) {
      return {
        name: name,
        version: "0.0.1",
        consent: consent,
        runtime: "client",
        init: function () { return Promise.resolve(); },
        transform: function (event) { return event; },
        send: function (payload) {
          window.__TEST__.events.push({ destination: name, payload: payload });
          return Promise.resolve();
        },
      };
    }

    /**
     * Called from Playwright via page.evaluate() to initialize Junction
     * with a given config.
     */
    window.initJunction = function (config) {
      window.__TEST__.events = [];

      var defaults = {
        name: "e2e-test",
        environment: "test",
        consent: {
          defaultState: {},
          queueTimeout: 30000,
          respectDNT: false,
          respectGPC: false,
        },
        destinations: [
          { destination: createSink("amplitude", ["analytics"]), config: {} },
          { destination: createSink("sentry", ["exempt"]), config: {} },
          { destination: createSink("meta-pixel", ["marketing"]), config: {} },
          { destination: createSink("ga4", ["analytics", "marketing"]), config: {} },
        ],
        debug: true,
        buffer: { maxSize: 1, maxWait: 100 },
      };

      // Merge caller config into defaults
      var merged = Object.assign({}, defaults, config);
      if (config && config.consent) {
        merged.consent = Object.assign({}, defaults.consent, config.consent);
      }
      if (!config || !config.destinations) {
        merged.destinations = defaults.destinations;
      }

      var collector = Junction.createCollector({
        config: merged,
        source: { type: "client", name: "e2e-test", version: "0.0.1" },
      });

      // Initialize debug panel
      Junction.createDebugPanel(collector, { startOpen: true });

      window.__TEST__.collector = collector;
      return true;
    };

    // Auto-init so the debug panel appears on page load
    window.initJunction();
  </script>
</body>
</html>
